<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>GRINDWAVE — generative radio</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" id="themecolor" content="#0a1020">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="GRINDWAVE">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230a1126'/%3E%3Cpath d='M3 16 q3 -11 5.5 0 t5.5 0 t5.5 0 t5.5 0' fill='none' stroke='%2336e3ff' stroke-width='2.4' stroke-linecap='round'/%3E%3C/svg%3E">
<link rel="stylesheet" href="fonts/local-fonts.css"><!-- offline: Google fonts vendored locally -->
<style>
:root{
  --accent:#36e3ff; --accent2:#ff5ad8; --ink:#dff6ff; --dim:#7fa8c9;
  --panel:#0d1530; --panel2:#0a1126; --line:#1c2a55; --glow:0px;
  --pbg:#070d22; --sbg1:#020611; --sbg2:#040a18;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0; font-family:'VT323',ui-monospace,Menlo,Consolas,monospace; color:var(--ink);
  background:
    radial-gradient(1200px 600px at 80% -10%, color-mix(in srgb,var(--accent) 16%,transparent), transparent 60%),
    radial-gradient(900px 500px at 10% 110%, color-mix(in srgb,var(--accent2) 16%,transparent), transparent 60%),
    linear-gradient(180deg,#070b1c,#04060f 60%,#02030a);
  overflow:hidden; display:grid; place-items:center; min-height:100vh;
  -webkit-font-smoothing:none; image-rendering:pixelated;
  user-select:none; -webkit-user-select:none;
}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:2;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.20) 0 1px,transparent 1px 3px);
  mix-blend-mode:multiply;opacity:.55}
body::after{content:"";position:fixed;inset:-50%;pointer-events:none;z-index:0;opacity:.18;
  background-image:linear-gradient(color-mix(in srgb,var(--accent) 40%,transparent) 1px,transparent 1px),
    linear-gradient(90deg,color-mix(in srgb,var(--accent) 40%,transparent) 1px,transparent 1px);
  background-size:34px 34px; animation:drift 24s linear infinite}
@keyframes drift{to{transform:translate(34px,34px)}}

/* focus vignette — subtle always, grows when the window/tab isn't selected */
#vig{position:fixed;inset:0;pointer-events:none;z-index:60;opacity:.16;transition:opacity 1.9s ease, box-shadow .5s ease;
  box-shadow:inset 0 0 185px 95px rgba(0,0,0,.93), inset 0 0 75px 24px rgba(0,0,0,.78);
  background:radial-gradient(135% 135% at 50% 50%, transparent 42%, rgba(0,0,0,.62) 100%);}
#vig.big{box-shadow:inset 0 0 340px 210px rgba(0,0,0,.98), inset 0 0 160px 80px rgba(0,0,0,.92);}

/* page rain overlay (rain skin) */
#rain{position:fixed;inset:0;pointer-events:none;z-index:1;opacity:0;transition:opacity .8s;
  background-image:repeating-linear-gradient(101deg, transparent 0 8px, rgba(160,205,255,.07) 8px 9px);
  animation:rainfall .6s linear infinite}
@keyframes rainfall{from{background-position:0 0}to{background-position:-26px 100vh}}
body[data-skin="rain"] #rain{opacity:.45}

/* custom cursor follower */
#cur{position:fixed;left:0;top:0;width:22px;height:22px;border:2px solid var(--accent);border-radius:50%;
  transform:translate(-50%,-50%);pointer-events:none;z-index:95;box-shadow:0 0 12px var(--accent);
  mix-blend-mode:screen;transition:width .12s,height .12s,opacity .2s;opacity:0}
#cur::after{content:"";position:absolute;left:50%;top:50%;width:3px;height:3px;border-radius:50%;background:var(--accent);transform:translate(-50%,-50%)}
#cur.big{width:34px;height:34px}
/* with the custom cursor active (desktop), hide the native cursor everywhere incl. buttons/rows/links */
body:not(.mobile), body:not(.mobile) *{cursor:none !important}

.wrap{display:flex;flex-direction:column;align-items:stretch;width:min(880px,94vw)}
.tabs{display:flex;flex-wrap:wrap;gap:6px;padding-left:6px;max-width:100%}
.tab{font-family:'Press Start 2P',monospace;font-size:10px;letter-spacing:1px;cursor:pointer;color:var(--dim);
  background:#0a1228;border:2px solid var(--line);border-bottom:none;border-radius:9px 9px 0 0;padding:8px 11px 11px;
  transition:color .12s,background .12s,box-shadow .12s;white-space:nowrap}
.tab:hover{color:var(--ink)}
.tab.active{color:#fff;border-color:var(--accent);box-shadow:0 -2px 16px color-mix(in srgb,var(--accent) 40%,transparent)}

.shell{position:relative;z-index:3;
  background:linear-gradient(180deg,var(--panel),var(--panel2));
  border:3px solid var(--accent); border-radius:18px;
  box-shadow:0 0 0 2px #00000088, 0 0 calc(30px + var(--glow)) color-mix(in srgb,var(--accent) 45%,transparent),
    inset 0 0 0 1px #ffffff12, inset 0 14px 30px #00000055;
  padding:18px; transition:box-shadow .04s linear;}
.topbar{display:flex;align-items:center;gap:12px;margin-bottom:12px;position:relative}
.emblem{display:none;align-items:center}
.emblem svg{width:26px;height:26px;filter:drop-shadow(0 0 7px #ffe60a)}
.logo{font-family:'Press Start 2P',monospace;font-size:18px;letter-spacing:1px;color:#fff;text-shadow:0 0 8px var(--accent), 3px 3px 0 var(--accent2);}
.logo b{color:var(--accent)}
.tag{font-size:20px;color:var(--dim);margin-left:2px}
.tag .blink{animation:blink 1s steps(1) infinite;color:var(--accent)}
@keyframes blink{50%{opacity:0}}
.power{margin-left:auto;font-size:18px;color:var(--dim);display:flex;gap:8px;align-items:center}
.led{width:10px;height:10px;border-radius:2px;background:var(--accent);box-shadow:0 0 10px var(--accent)}

.main{display:grid;grid-template-columns:1.45fr 1fr;gap:14px}
.screen{position:relative;border-radius:12px;overflow:hidden;background:linear-gradient(180deg,var(--sbg1),var(--sbg2));
  border:2px solid var(--line);box-shadow:inset 0 0 26px #000a, inset 0 0 0 1px #ffffff08}
#viz{display:block;width:100%;height:212px;image-rendering:pixelated}
.nowrap{position:absolute;left:12px;right:12px;bottom:10px;display:flex;flex-direction:column;gap:2px;text-shadow:0 0 6px #000, 0 1px 0 #000}
.np-label{font-size:16px;color:var(--accent);letter-spacing:2px}
.np-title{font-family:'Press Start 2P',monospace;font-size:15px;color:#fff;text-shadow:0 0 10px var(--accent)}
.np-mood{font-size:18px;color:var(--dim)}
.chips{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap}
.chip{font-size:15px;padding:1px 8px;border:1px solid var(--line);border-radius:999px;color:var(--dim);background:#0a1330}
.chip b{color:var(--accent)}
/* KEY/SCALE/TEMPO/LEN are detail metadata — desktop reveals them only on screen hover; mobile drops them entirely (see mobile block) */
body:not(.mobile) .nowrap .chips{opacity:0;transform:translateY(4px);transition:opacity .22s ease,transform .22s ease;pointer-events:none}
body:not(.mobile) .screen:hover .chips{opacity:1;transform:none}

.side{display:flex;flex-direction:column;gap:10px;min-width:0}
.list{background:var(--pbg);border:2px solid var(--line);border-radius:12px;padding:6px;overflow-y:auto;max-height:250px;
  cursor:grab;scrollbar-width:none;-ms-overflow-style:none;overscroll-behavior:contain;
  -webkit-mask-image:linear-gradient(180deg,transparent 0,#000 13px,#000 calc(100% - 13px),transparent 100%);
  mask-image:linear-gradient(180deg,transparent 0,#000 13px,#000 calc(100% - 13px),transparent 100%)}
.list::-webkit-scrollbar{display:none}
.list.grabbing{cursor:grabbing}
.row{position:relative;display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:8px;cursor:pointer;font-size:19px;color:var(--ink);transition:background .12s, transform .12s}
.row:hover{background:#0e1838;transform:translateX(2px)}
.row.active{background:linear-gradient(90deg,color-mix(in srgb,var(--accent) 30%,transparent),transparent);box-shadow:inset 0 0 0 1px var(--accent)}
.dot{width:11px;height:11px;border-radius:3px;flex:none;box-shadow:0 0 8px currentColor}
.row .nm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .meta{font-size:14px;color:var(--dim)}
.row .dur{font-size:13px;color:#6f8093;opacity:0;transition:opacity .14s;min-width:34px;text-align:right}
.row:hover .dur{opacity:1}
.row.active .eq{display:flex}
.eq{display:none;gap:2px;align-items:flex-end;height:14px}
.eq i{width:3px;background:var(--accent);animation:eq .9s ease-in-out infinite}
.eq i:nth-child(2){animation-delay:.15s}.eq i:nth-child(3){animation-delay:.3s}
@keyframes eq{0%,100%{height:4px}50%{height:14px}}

.controls{display:flex;align-items:center;gap:8px;background:var(--pbg);border:2px solid var(--line);border-radius:12px;padding:10px}
button.btn{font-family:'VT323',monospace;font-size:20px;color:#02060f;cursor:pointer;background:linear-gradient(180deg,#bfefff,var(--accent));border:none;border-radius:9px;padding:6px 11px;box-shadow:0 3px 0 #0a3a52, 0 0 14px color-mix(in srgb,var(--accent) 60%,transparent);text-shadow:0 1px 0 #fff8;transition:transform .06s, box-shadow .12s}
button.btn:active{transform:translateY(2px);box-shadow:0 1px 0 #0a3a52}
button.btn.ghost{background:#0e1838;color:var(--ink);box-shadow:0 3px 0 #060c1e;border:1px solid var(--line)}
.play{font-size:22px;padding:6px 15px}
.vol{display:flex;align-items:center;gap:7px;margin-left:auto;font-size:17px;color:var(--dim)}
input[type=range]{-webkit-appearance:none;appearance:none;width:92px;height:8px;border-radius:6px;background:linear-gradient(90deg,var(--accent),var(--accent2));outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:18px;border-radius:3px;background:#fff;box-shadow:0 0 8px var(--accent);cursor:pointer}
.hint{margin-top:9px;font-size:16px;color:var(--dim);text-align:center;letter-spacing:1px}
.hint b{color:var(--accent)}
.marquee{overflow:hidden;white-space:nowrap;margin-top:2px}
.marquee span{display:inline-block;padding-left:100%;animation:mq 20s linear infinite;color:var(--dim);font-size:16px}
@keyframes mq{to{transform:translateX(-100%)}}

/* ============ SKINS ============ */
/* cyberpunk */
body[data-skin="cyber"]{background:radial-gradient(1000px 520px at 80% -10%, #ffe60a18, transparent 60%),radial-gradient(820px 420px at 8% 112%, #ff2e6e14, transparent 60%),linear-gradient(180deg,#0b0b07,#060604 60%,#040402);}
body[data-skin="cyber"] .shell{border-radius:2px;background:linear-gradient(180deg,#0e0e0a,#080806);clip-path:polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px))}
body[data-skin="cyber"] .screen,body[data-skin="cyber"] .list,body[data-skin="cyber"] .controls,body[data-skin="cyber"] button.btn,body[data-skin="cyber"] .chip{border-radius:2px}
body[data-skin="cyber"] .logo{color:#ffe60a;animation:glitch 2.8s infinite steps(3)}
body[data-skin="cyber"] .logo b{color:#fff}
body[data-skin="cyber"] .emblem{display:inline-flex}
body[data-skin="cyber"] .np-title{text-shadow:0 0 10px #ffe60a, 2px 0 #ff2e6e}
body[data-skin="cyber"] .tab{border-radius:0;background:#0c0c08;clip-path:polygon(0 0, calc(100% - 12px) 0, 100% 100%, 0 100%)}
body[data-skin="cyber"] .tab.active{color:#0a0a06;background:#ffe60a;border-color:#ffe60a;box-shadow:0 0 18px #ffe60a88}
@keyframes glitch{0%,92%,100%{text-shadow:0 0 9px var(--accent)}93%{text-shadow:2px 0 #ff2e6e,-2px 0 #00e5ff}95%{text-shadow:-2px 0 #ff2e6e,2px 0 #00e5ff}97%{text-shadow:1px 0 #00e5ff,-1px 0 #ffe60a}}
/* rain */
body[data-skin="rain"]{background:radial-gradient(1000px 560px at 70% -10%, #4f7fbf22, transparent 60%),radial-gradient(820px 460px at 12% 112%, #2a3f5f30, transparent 60%),linear-gradient(180deg,#0a1422,#070f1b 60%,#050a14);}
body[data-skin="rain"] .logo{text-shadow:0 0 8px var(--accent), 2px 2px 0 #2b4a72}
/* vaporwave */
body[data-skin="vapor"]{background:linear-gradient(180deg,#2a1840,#3a1d52 40%,#0c1530);}
body[data-skin="vapor"] .shell{border-radius:20px;background:linear-gradient(180deg,#2a1a44,#1a1030)}
body[data-skin="vapor"] .logo{text-shadow:0 0 10px #ff9ed8, 3px 3px 0 #8ad8ff}
/* game boy DMG */
body[data-skin="gameboy"]{background:linear-gradient(180deg,#142210,#0c1a0a);}
body[data-skin="gameboy"]{--ink:#9bbc0f;--dim:#6a8f1a}
body[data-skin="gameboy"] .shell{border-radius:14px 14px 46px 14px;background:linear-gradient(180deg,#cbcfb0,#a6ab8a);border:3px solid #6a6e50;box-shadow:0 8px 0 #6a6e50,inset 0 0 0 2px #e7ead0}
body[data-skin="gameboy"] .logo{color:#2c3a1a;text-shadow:none;image-rendering:pixelated}
body[data-skin="gameboy"] .logo b{color:#1a2a0a}
body[data-skin="gameboy"] .tag,body[data-skin="gameboy"] .power{color:#46502c}
body[data-skin="gameboy"] .screen,body[data-skin="gameboy"] .list,body[data-skin="gameboy"] .controls{border-radius:2px;border-color:#306230}
body[data-skin="gameboy"] button.btn{background:linear-gradient(180deg,#9bbc0f,#6a8f1a);color:#0f380f;border-radius:2px;box-shadow:0 3px 0 #143a14}
/* matrix */
body[data-skin="matrix"]{background:#000;--ink:#00ff66;--dim:#0a8f44;--panel:#021a0c;--panel2:#010a06;--line:#0a5a2a}
body[data-skin="matrix"] .shell{border-radius:2px;border-color:#00ff66;background:#010a06;box-shadow:0 0 22px #00ff6655,inset 0 0 0 1px #00ff6622}
body[data-skin="matrix"] .logo{color:#00ff66;text-shadow:0 0 10px #00ff66;font-family:'VT323',monospace;font-size:26px;letter-spacing:2px}
body[data-skin="matrix"] .tag,body[data-skin="matrix"] .hint,body[data-skin="matrix"] .marquee span{font-family:'VT323',monospace}
body[data-skin="matrix"] button.btn{background:linear-gradient(180deg,#00ff66,#0a8f44);color:#001a0c}
/* lo-fi café */
body[data-skin="lofi"]{background:linear-gradient(180deg,#241a12,#1a130c);--ink:#e8d4b8;--dim:#a98c6a;--line:#4a3a2a;--accent:#d2a679;--accent2:#c89b6c}
body[data-skin="lofi"] .shell{border-radius:16px;background:linear-gradient(180deg,#2c2016,#1c140d);border-color:#d2a679}
body[data-skin="lofi"] .logo{color:#e8d4b8;text-shadow:0 0 8px #d2a679, 2px 2px 0 #6a4a2a}
/* forest */
body[data-skin="forest"]{background:radial-gradient(900px 500px at 50% -10%, #2a6a3a22, transparent 60%),linear-gradient(180deg,#0e2014,#08160d);--ink:#dff7e2;--dim:#6fae84;--line:#1f4a2e}
body[data-skin="forest"] .shell{border-radius:18px;background:linear-gradient(180deg,#10301c,#0a2014);border-color:#7bd88f}
body[data-skin="forest"] .logo{text-shadow:0 0 8px #7bd88f, 2px 2px 0 #1f4a2e}
/* space */
body[data-skin="space"]{background:radial-gradient(1100px 600px at 70% -20%, #6b4ad022, transparent 60%),linear-gradient(180deg,#0a0a1e,#05030f 60%,#020108);--ink:#e6e0ff;--dim:#9a8cd0;--line:#2a2055}
body[data-skin="space"] .shell{border-radius:16px;background:linear-gradient(180deg,#120e2c,#0a081c);border-color:#b18cff}
body[data-skin="space"] .logo{text-shadow:0 0 12px #b18cff, 2px 2px 0 #3a2a6a}
/* dungeon */
body[data-skin="dungeon"]{background:radial-gradient(700px 400px at 50% 120%, #ff7a2c1c, transparent 60%),linear-gradient(180deg,#15100a,#0c0805);--ink:#f0d6b0;--dim:#a8794a;--line:#3a2a18;--accent:#ff9a3c;--accent2:#ffb45a}
body[data-skin="dungeon"] .shell{border-radius:8px;background:linear-gradient(180deg,#1c140c,#120c07);border-color:#ff9a3c;animation:torch 3.5s ease-in-out infinite}
body[data-skin="dungeon"] .logo{color:#ffb45a;text-shadow:0 0 10px #ff7a2c, 2px 2px 0 #3a2010}
@keyframes torch{0%,100%{box-shadow:0 0 0 2px #000,0 0 26px #ff7a2c44,inset 0 0 30px #0008}50%{box-shadow:0 0 0 2px #000,0 0 40px #ff7a2c66,inset 0 0 30px #0008}}

/* per-skin panel colors so the whole player takes on the genre */
body[data-skin="cyber"]{--pbg:#100d04;--sbg1:#0a0a04;--sbg2:#15110a}
body[data-skin="rain"]{--pbg:#0a1626;--sbg1:#061018;--sbg2:#0a1422}
body[data-skin="vapor"]{--pbg:#241640;--sbg1:#1a1030;--sbg2:#2a1a44}
body[data-skin="gameboy"]{--pbg:#0f380f;--sbg1:#0a280a;--sbg2:#143a14}
body[data-skin="matrix"]{--pbg:#021a0c;--sbg1:#010a06;--sbg2:#02140a}
body[data-skin="lofi"]{--pbg:#2c2016;--sbg1:#1c140d;--sbg2:#33271a}
body[data-skin="forest"]{--pbg:#10301c;--sbg1:#0a2014;--sbg2:#123420}
body[data-skin="space"]{--pbg:#120e2c;--sbg1:#0a081c;--sbg2:#140f30}
body[data-skin="dungeon"]{--pbg:#1c140c;--sbg1:#120c07;--sbg2:#221710}

/* cyberpunk loading-screen streaks near the title (pink/yellow) */
#cyberfx{display:none;position:absolute;left:-4px;right:-4px;top:-8px;height:42px;pointer-events:none;overflow:hidden;z-index:4}
#cyberfx i{position:absolute;height:2px;left:0;width:42%;opacity:.9;border-radius:2px;box-shadow:0 0 6px currentColor;animation:streak 1.5s linear infinite}
@keyframes streak{0%{transform:translateX(-130%)}100%{transform:translateX(380%)}}
body[data-skin="cyber"] #cyberfx{display:block}

/* custom right-click menu */
#cmenu{display:none;position:fixed;z-index:100;background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--accent);border-radius:9px;padding:5px;font-family:'VT323',monospace;font-size:18px;color:var(--ink);box-shadow:0 0 18px color-mix(in srgb,var(--accent) 50%,transparent);min-width:160px}
#cmenu div{padding:6px 11px;border-radius:6px;white-space:nowrap}
#cmenu div:hover{background:color-mix(in srgb,var(--accent) 28%,transparent);color:#fff}

/* living, section-themed background */
#bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
#bg::before,#bg::after{content:"";position:absolute;width:64vw;height:64vw;border-radius:50%;filter:blur(85px);opacity:.16}
#bg::before{left:-12vw;top:-16vw;background:var(--accent);animation:blob1 28s ease-in-out infinite}
#bg::after{right:-12vw;bottom:-16vw;background:var(--accent2);animation:blob2 34s ease-in-out infinite}
@keyframes blob1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(22vw,12vh) scale(1.25)}}
@keyframes blob2{0%,100%{transform:translate(0,0) scale(1.1)}50%{transform:translate(-18vw,-10vh) scale(.85)}}

/* AI-generated per-station raster art — fixed full-viewport so it always covers the screen even when the box scrolls off (iPhone), crossfaded between two stacked layers */
#bgwrap{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;background:#05060a}
.bglayer{position:absolute;inset:-3%;background-size:cover;background-position:center;opacity:0;transition:opacity .7s ease;will-change:opacity}
.bglayer.on{opacity:1}
#bgscrim{position:absolute;inset:0;background:radial-gradient(125% 125% at 50% 38%, transparent 38%, rgba(0,0,0,.5) 100%)}
body.mobile #bgscrim{background:radial-gradient(140% 140% at 50% 42%, transparent 30%, rgba(0,0,0,.58) 100%)}

/* broader-background canvas (per-section big graphics) */
#bgcanvas{position:fixed;inset:0;z-index:1;pointer-events:none}

/* game boy: the whole player frame becomes the handheld; the borders carry the controls */
#gbframe{display:none;position:absolute;inset:0;pointer-events:none;z-index:5}
body[data-skin="gameboy"] #gbframe{display:block}
body[data-skin="gameboy"] .shell{padding:16px 92px 126px 92px}
#gbframe .dpad{position:absolute;left:20px;top:46%;width:62px;height:62px;transform:translateY(-50%);
  background:radial-gradient(circle at 50% 50%,#4a4a54 0 7px,transparent 8px);z-index:2}
#gbframe .dpad::before,#gbframe .dpad::after{content:"";position:absolute;border-radius:6px;
  background:linear-gradient(180deg,#3c3c44,#26262c);box-shadow:inset 0 1px 0 #ffffff22,inset 0 0 0 1px #111,0 3px 0 #0a0a0a}
#gbframe .dpad::before{left:22px;top:0;width:18px;height:62px}
#gbframe .dpad::after{left:0;top:22px;width:62px;height:18px}
#gbframe .ab{position:absolute;right:14px;top:44%;width:78px;height:100px;transform:translateY(-50%) rotate(-18deg)}
#gbframe .ab span{position:absolute;width:40px;height:40px;border-radius:50%;
  background:radial-gradient(circle at 38% 30%,#c2356f,#8a1f4f 60%,#5e1334);
  box-shadow:inset 0 2px 3px #ffffff55,inset 0 -3px 5px #0008,0 4px 0 #4a1029,0 0 14px #8a1f4f88;
  color:#ffe3f0;display:flex;align-items:center;justify-content:center;font-family:'Press Start 2P',monospace;font-size:12px;text-shadow:0 1px 1px #0008}
#gbframe .ab .bbtn{left:0;top:48px}
#gbframe .ab .abtn{right:0;top:4px;animation:gbidle 2.4s ease-in-out infinite}
/* function hint under each face button so the controls read as obvious actions */
#gbframe .ab span::after{content:attr(data-fn);position:absolute;top:42px;left:50%;transform:translateX(-50%);

#gbframe .ss{position:absolute;left:50%;bottom:42px;transform:translateX(-50%) rotate(-18deg);display:flex;gap:26px}
#gbframe .ss span{position:relative;width:42px;height:11px;border-radius:7px;background:#2c2c30;box-shadow:inset 0 0 0 1px #111,0 2px 0 #0a0a0a}
#gbframe .ss span::after{content:attr(data-l);position:absolute;left:0;top:13px;width:100%;text-align:center;font-family:'Press Start 2P',monospace;font-size:6px;color:#46502c}
#gbframe .speaker{position:absolute;right:32px;bottom:22px;display:flex;gap:5px;transform:rotate(-18deg)}
#gbframe .speaker i{width:4px;height:30px;border-radius:3px;background:#7a7e60;box-shadow:inset 0 0 0 1px #5a5e44}
/* interactive Game Boy controls — the device borders are real buttons (per the original spec) */
#gbframe .ab span,#gbframe .ss span,#gbframe .gbhit{pointer-events:auto;cursor:pointer;-webkit-tap-highlight-color:transparent}
#gbframe .gbhit{position:absolute}
#gbframe .ab span.gbpress{filter:brightness(1.3);transform:translateY(2px)}
#gbframe .ss span.gbpress{filter:brightness(1.3);transform:translateY(1px)}
#led.gbflash{background:#fff;box-shadow:0 0 16px var(--accent),0 0 7px #fff}
/* authentic DMG screen: chunky olive bezel + red power LED */
body[data-skin="gameboy"] .screen{border-color:#3a3e2c;border-width:3px;box-shadow:inset 0 0 0 6px #6b6f50, inset 0 0 22px #0009}
body[data-skin="gameboy"] .screen::before{content:"";position:absolute;left:9px;top:9px;width:7px;height:7px;border-radius:50%;background:#e23b3b;box-shadow:0 0 6px #e23b3b;z-index:4}
/* Game Boy on mobile: vertical-handheld layout — full-width screen/list, controls in a bottom deck */
body.mobile[data-skin="gameboy"] .shell{padding:14px 16px 186px 16px}
body.mobile[data-skin="gameboy"] #gbframe .dpad{left:34px;top:auto;bottom:60px;transform:none;width:60px;height:60px;background:radial-gradient(circle,#3a3a42 0 8px,transparent 9px)}
body.mobile[data-skin="gameboy"] #gbframe .dpad::before{left:21px;top:0;width:18px;height:60px}
body.mobile[data-skin="gameboy"] #gbframe .dpad::after{left:0;top:21px;width:60px;height:18px}
body.mobile[data-skin="gameboy"] #gbframe .ab{right:28px;top:auto;bottom:66px;width:86px;height:62px;transform:rotate(-18deg)}
body.mobile[data-skin="gameboy"] #gbframe .ab .abtn{right:0;top:0}
body.mobile[data-skin="gameboy"] #gbframe .ab .bbtn{left:0;top:26px}
body.mobile[data-skin="gameboy"] #gbframe .ss{bottom:22px}
body.mobile[data-skin="gameboy"] #gbframe .speaker{display:none}

/* tooltip */
#tip{position:fixed;z-index:80;pointer-events:none;opacity:0;transition:opacity .12s;font-family:'VT323',monospace;font-size:16px;line-height:1.15;color:var(--ink);letter-spacing:.5px;background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--accent);border-radius:8px;padding:4px 9px;max-width:250px;text-shadow:0 0 6px #000;box-shadow:0 0 14px color-mix(in srgb,var(--accent) 50%,transparent), inset 0 0 0 1px #ffffff10}

/* ============ MOBILE — completely separate build (JS-detected `body.mobile`) ============
   Compact glass layout: WAY smaller text, everything above the fold (no scrolling to reach
   the controls), blended/borderless panels over the AI art, a real focus vignette, fully
   tappable rows & buttons, no KEY/SCALE chips, none of the desktop-only marquee/hint that
   used to overflow. Game Boy is excluded from the glass treatment so it stays opaque plastic. */
@media(max-width:700px){           /* lightweight fallback for narrow NON-touch viewports */
  html,body{overflow-x:hidden;overflow-y:auto;height:auto}
  body{display:block;place-items:initial;min-height:100dvh}
  .wrap{width:92vw;margin:3vh auto}
  .main{grid-template-columns:1fr}
  .tabs{flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
}
body.mobile{ overflow-x:hidden;overflow-y:auto;display:block;place-items:initial;
  height:auto;min-height:100dvh;-webkit-overflow-scrolling:touch;cursor:auto !important;font-size:14px;
  padding:calc(env(safe-area-inset-top) + 4px) env(safe-area-inset-right) calc(env(safe-area-inset-bottom) + 10px) env(safe-area-inset-left); }
body.mobile #cur{display:none}
body.mobile .wrap{width:min(430px,95vw);margin:1.5vh auto 2.5vh}

body.mobile .tabs{flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;gap:5px;padding-left:3px;
  -webkit-mask-image:linear-gradient(90deg,transparent,#000 12px,#000 calc(100% - 12px),transparent);
  mask-image:linear-gradient(90deg,transparent,#000 12px,#000 calc(100% - 12px),transparent)}
body.mobile .tabs::-webkit-scrollbar{display:none}
body.mobile .tab{font-size:8px;letter-spacing:.5px;padding:6px 9px 8px;border-width:1px;border-radius:8px 8px 0 0}
/* topbar / titles — way smaller */
body.mobile .topbar{gap:7px;margin-bottom:8px}
body.mobile .logo{font-size:12px}
body.mobile .tag{font-size:12px}
body.mobile .power{font-size:11px;gap:5px}
body.mobile .led{width:7px;height:7px}
/* layout */
body.mobile .main{grid-template-columns:1fr;gap:9px}
body.mobile .side{gap:8px}
/* screen / visualizer + NOW PLAYING overlay */
body.mobile #viz{height:126px}
body.mobile .nowrap{left:10px;right:10px;bottom:8px;gap:1px;background:linear-gradient(transparent,rgba(4,6,12,.68) 44%);padding:16px 0 2px;border-radius:0 0 12px 12px}
body.mobile .np-label{font-size:9px;letter-spacing:1.5px}
body.mobile .np-title{font-size:11px;word-break:break-word}
body.mobile .np-mood{font-size:11px}
body.mobile .nowrap .chips{display:none}
/* station list — short enough that controls stay on-screen; smaller rows, fully tappable */
body.mobile .list{max-height:36vh}
body.mobile .row{padding:9px;font-size:13px;gap:7px;border-radius:9px;min-height:42px}
body.mobile .row .nm{font-size:13px}
body.mobile .row .meta{font-size:10px}
body.mobile .row .dur{display:none}
body.mobile .dot{width:9px;height:9px}
/* controls — compact; each button fills its slot so the whole bordered area is tappable; vol on its own row */
body.mobile .controls{flex-wrap:wrap;justify-content:center;gap:6px;padding:7px}
body.mobile button.btn{flex:1 1 0;min-width:0;padding:12px 0;font-size:18px;border-radius:10px;min-height:48px;font-variant-emoji:text}
body.mobile .play{flex:1.4 1 0}
body.mobile .vol{margin-left:0;flex:1 1 100%;width:100%;justify-content:center;margin-top:6px;font-size:12px}
body.mobile input[type=range]{width:62%;height:10px}
/* drop desktop-only chrome that overflowed awkwardly on phones */
body.mobile .marquee{display:none}
body.mobile .hint{display:none}
/* a real focus vignette on mobile (the old one was dialled down to nothing) */
body.mobile #vig{opacity:.55;box-shadow:inset 0 0 120px 42px rgba(0,0,0,.72), inset 0 0 48px 14px rgba(0,0,0,.55);

body.mobile #vig.big{opacity:.92;box-shadow:inset 0 0 210px 95px rgba(0,0,0,.93)}
body.mobile #bgcanvas{opacity:.9}
body.mobile #bg::before,body.mobile #bg::after{opacity:.30;filter:blur(58px)}

body.mobile #gbframe .ab span::after{display:none}
/* ---- glass / blended-border treatment for every skin EXCEPT Game Boy (stays opaque plastic) ---- */
body.mobile:not([data-skin="gameboy"]) .shell{padding:12px 12px 14px;border-width:1px;border-radius:16px;

body.mobile:not([data-skin="gameboy"]) .screen{border-width:1px;border-radius:12px;
  border-color:color-mix(in srgb,var(--ink) 14%,transparent);
  background:linear-gradient(180deg,color-mix(in srgb,var(--sbg1) 64%,transparent),color-mix(in srgb,var(--sbg2) 78%,transparent));
  -webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px)}
body.mobile:not([data-skin="gameboy"]) .list{border:none;border-radius:12px;padding:4px;background:color-mix(in srgb,var(--pbg) 48%,transparent)}
body.mobile:not([data-skin="gameboy"]) .controls{border:none;border-radius:12px;background:color-mix(in srgb,var(--pbg) 48%,transparent)}
body.mobile:not([data-skin="gameboy"]) .tab{background:color-mix(in srgb,var(--panel) 55%,transparent);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px)}
</style>

  bgMtx=[]; const cols=Math.floor(W/28); for(let i=0;i<cols;i++) bgMtx.push({x:i*28+6,y:Math.random()*H,sp:1.2+Math.random()*2.2,trick:Math.random()<.16});

  bgHills=[{h:.2,o:42,c:"#0b1430"},{h:.13,o:13,c:"#0d1838"},{h:.07,o:71,c:"#11214a"}];
  drawBgStatic(); bgReady=true; }

  } else if(k==="pixel"){ const sunx=W*.78,suny=H*.3,R=Math.min(W,H)*.16; const sg=c.createLinearGradient(sunx,suny-R,sunx,suny+R); sg.addColorStop(0,"#ffd24a"); sg.addColorStop(1,"#ff7ad0"); c.fillStyle=sg;

  } else if(k==="gameboy"){ c.fillStyle="rgba(48,98,48,.10)"; for(let y=6;y<H;y+=8) for(let x2=6;x2<W;x2+=8) c.fillRect(x2,y,2,2);
  } else if(k==="lofi"){ const wx=W*.5-220,wy=H*.18,ww=440,wh=H*.58; c.fillStyle="rgba(24,16,10,.5)"; c.fillRect(wx-14,wy-14,ww+28,wh+28); c.fillStyle="rgba(14,18,34,.7)"; c.fillRect(wx,wy,ww,wh);
    for(let i=0;i<14;i++){ const bxx=wx+i*(ww/14), bhh=wh*(.3+((i*37)%9)/13); c.fillStyle="#0a1024"; c.fillRect(bxx,wy+wh-bhh,ww/14-3,bhh);
      for(let ly=wy+wh-bhh+6;ly<wy+wh-6;ly+=10){ if(((i*7+(ly|0))%3)===0){ c.fillStyle="rgba(210,166,121,.5)"; c.fillRect(bxx+4,ly,4,5);} } }
    c.strokeStyle="rgba(210,166,121,.5)"; c.lineWidth=3; c.strokeRect(wx,wy,ww,wh); c.beginPath(); c.moveTo(wx+ww/2,wy); c.lineTo(wx+ww/2,wy+wh); c.moveTo(wx,wy+wh/2); c.lineTo(wx+ww,wy+wh/2); c.stroke();

/* motion-only ambient overlays layered OVER the AI raster art (#bgwrap); no opaque scene drawing */
function bgFx(pulse){ const W=bcv.width,H=bcv.height; if(bgSec!==sectionKey||!bgReady){ bgSec=sectionKey; bgInit(); } bctx.clearRect(0,0,W,H); const k=sectionKey;
  if(k==="cyber"){ const hz=H*.82; const lx=W*.5+Math.sin(phase*.14)*W*.42; const g=bctx.createLinearGradient(lx,0,lx,hz); g.addColorStop(0,"rgba(0,229,255,.05)"); g.addColorStop(1,"rgba(0,229,255,0)"); bctx.fillStyle=g; bctx.beginPath(); bctx.moveTo(lx,0); bctx.lineTo(lx-70,hz); bctx.lineTo(lx+70,hz); bctx.closePath(); bctx.fill(); }
  else if(k==="rain"){ bctx.strokeStyle="rgba(150,195,255,.30)"; bctx.lineWidth=1.2; for(const d of bgRainD){ bctx.beginPath(); bctx.moveTo(d.x,d.y); bctx.lineTo(d.x-3,d.y+d.l); bctx.stroke(); d.y+=d.s+(playing?3:1); d.x-=1; if(d.y>H){d.y=-d.l;d.x=Math.random()*W;} }
    const py=H*.9; bctx.strokeStyle="rgba(170,205,255,.10)"; bctx.lineWidth=1; for(let i=0;i<7;i++){ const rr=(phase*26+i*90)%200; bctx.beginPath(); bctx.ellipse(((i*W/7)+(phase*5)%(W/7)), py+(H-py)*.5, rr, rr*.18,0,0,7); bctx.stroke(); } }
  else if(k==="matrix"){ bctx.font="20px monospace"; bctx.fillStyle="rgba(150,255,190,.55)"; for(const m of bgMtx){ if(!m.trick)continue; bctx.fillText(Math.random()<.5?"0":"1", m.x, m.y); m.y+=m.sp*(playing?2.2:1.2); if(m.y>H+10)m.y=-10; } }
  else if(k==="dungeon"){ bctx.fillStyle="rgba(255,120,30,"+(0.04+0.04*Math.abs(Math.sin(phase*.7))).toFixed(3)+")"; bctx.fillRect(0,0,W,H);
    for(const e of bgFire){ const a=.3+.5*Math.abs(Math.sin(phase*.8+e.a)); bctx.fillStyle="rgba(255,150,60,"+a.toFixed(2)+")"; bctx.fillRect(e.x,e.y,e.r,e.r); e.y-=e.sp*(playing?1.5:.8); e.x+=Math.sin(phase*.5+e.a)*.4; if(e.y<H*.12){e.y=H*.9;e.x=Math.random()*W;} } }
  else if(k==="vapor"){ bctx.fillStyle="rgba(255,200,235,.55)"; for(const e of bgFire){ bctx.fillRect(e.x,e.y,1.6,1.6); e.y-=e.sp*.5; e.x+=Math.sin(phase*.4+e.a)*.5; if(e.y<0){e.y=H;e.x=Math.random()*W;} } }

  else if(k==="gameboy"){ const g=bgGb; g.x+=g.vx*(playing?1.4:.6); if(g.x>W*.84||g.x<W*.16)g.vx*=-1; const hop=Math.abs(Math.sin(phase*3))*14*(playing?1:.4), s=26, gy=g.y-hop;
    bctx.fillStyle="rgba(15,56,15,.55)"; bctx.fillRect(g.x,gy,s,s); bctx.fillStyle="rgba(15,56,15,.8)"; bctx.fillRect(g.x+6,gy+6,5,5); bctx.fillRect(g.x+15,gy+6,5,5); bctx.fillRect(g.x+8,gy+16,10,4); }
  else if(k==="lofi"){ bctx.fillStyle="rgba(235,205,165,.4)"; for(const e of bgFire){ bctx.fillRect(e.x,e.y,1.6,1.6); e.y-=e.sp*.35; e.x+=Math.sin(phase*.25+e.a)*.4; if(e.y<0){e.y=H;e.x=Math.random()*W;} } }
  else if(k==="forest"){ for(const f of bgFire){ const a=.3+.5*Math.abs(Math.sin(phase*.8+f.a)); bctx.fillStyle="rgba(190,255,150,"+a.toFixed(2)+")"; bctx.beginPath(); bctx.arc(f.x,f.y,f.r,0,7); bctx.fill(); f.x+=Math.sin(phase*.3+f.a)*.4; f.y-=f.sp*.3; if(f.y<H*.32){f.y=H;f.x=Math.random()*W;} } }
  else if(k==="space"){ const c=bgComet; c.x-=1.1*(playing?1.4:.7); c.y+=.5*(playing?1.4:.7); if(c.x<-60){c.x=W+40;c.y=Math.random()*H*.4;}
    const g=bctx.createLinearGradient(c.x,c.y,c.x+70,c.y-30); g.addColorStop(0,"rgba(200,224,255,.8)"); g.addColorStop(1,"rgba(200,224,255,0)"); bctx.strokeStyle=g; bctx.lineWidth=2.4; bctx.beginPath(); bctx.moveTo(c.x,c.y); bctx.lineTo(c.x+70,c.y-30); bctx.stroke(); bctx.fillStyle="#eaf2ff"; bctx.beginPath(); bctx.arc(c.x,c.y,2.6,0,7); bctx.fill(); }
}
function draw(){ requestAnimationFrame(draw); const w=cv.width,h=cv.height; cx.clearRect(0,0,w,h);
  const pulse = playing?beatPulse():0;
  $("shell").style.setProperty('--glow',(pulse*26).toFixed(1)+'px'); $("led").style.boxShadow=`0 0 ${(8+pulse*16).toFixed(0)}px var(--accent)`;
  secFx(w,h,pulse);
  if(playing&&analyser){ analyser.getByteFrequencyData(freqData); analyser.getByteTimeDomainData(timeData); }
  bgFx(pulse);
  const bars=48, bw=Math.floor(w/bars), lift=pulse*8;
  for(let i=0;i<bars;i++){ let v=(playing&&analyser)? freqData[i*2+2]/255 : (Math.sin(phase*.6+i*.4)*.5+.5)*.26+.04;
    const bh=Math.max(2,v*(h-30)+lift), x=i*bw+1, y=h-bh-2; const grd=cx.createLinearGradient(0,y,0,h); grd.addColorStop(0,css('--accent2')); grd.addColorStop(1,css('--accent'));
    cx.fillStyle=grd; for(let yy=y; yy<h-2; yy+=4){ cx.globalAlpha=.92; cx.fillRect(x,yy,bw-2,3); } cx.globalAlpha=.5; cx.fillStyle=css('--accent'); cx.fillRect(x,y-2,bw-2,2); }
  cx.globalAlpha=1;
  const midY=h*0.30, amp=20*(1+pulse*0.9); const pts=[]; for(let i=0;i<=w;i+=2){ const idx=Math.floor(i/w*(timeData?timeData.length:2));
    const t=(playing&&timeData)?(timeData[idx]/128-1):Math.sin(phase+i*.05)*.28; pts.push([i, midY+t*amp]); }
  cx.beginPath(); cx.moveTo(0,midY); for(const p of pts)cx.lineTo(p[0],p[1]); cx.lineTo(w,midY);
  const fill=cx.createLinearGradient(0,midY-amp,0,midY+amp); fill.addColorStop(0,'rgba(255,255,255,.10)'); fill.addColorStop(1,'transparent'); cx.fillStyle=fill; cx.fill();
  cx.save(); cx.globalAlpha=.22; cx.strokeStyle=css('--accent2'); cx.lineWidth=2; cx.beginPath(); pts.forEach((p,i)=> i?cx.lineTo(p[0],midY-(p[1]-midY)):cx.moveTo(p[0],midY-(p[1]-midY))); cx.stroke(); cx.restore();
  cx.save(); cx.shadowColor=css('--accent'); cx.shadowBlur=10+pulse*16; cx.lineWidth=2.4; cx.lineJoin="round";
  const lg=cx.createLinearGradient(0,0,w,0); lg.addColorStop(0,css('--accent')); lg.addColorStop(.5,'#ffffff'); lg.addColorStop(1,css('--accent2'));
  cx.strokeStyle=lg; cx.beginPath(); pts.forEach((p,i)=> i?cx.lineTo(p[0],p[1]):cx.moveTo(p[0],p[1])); cx.stroke(); cx.restore();
  drawLightning();
  phase+=playing?.16:.05; }
function css(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim()||"#36e3ff"; }

/* events */
$("play").onclick=()=>playing?stop():start();
$("next").onclick=()=>{ setStation(STATIONS.indexOf(station)+1); if(!playing)start(); };
$("prev").onclick=()=>{ setStation(STATIONS.indexOf(station)-1); if(!playing)start(); };
$("shuffle").onclick=shuffle;
$("vol").oninput=e=>{ volume=e.target.value/100; if(master&&playing)master.gain.value=volume; };
window.addEventListener("keydown",e=>{ const tag=(e.target.tagName||"").toLowerCase(); if(tag==="input")return;
  if(e.code==="Space"){e.preventDefault();playing?stop():start();}
  else if(e.code==="ArrowRight"){ setStation(STATIONS.indexOf(station)+1); if(!playing)start(); }
  else if(e.code==="ArrowLeft"){ setStation(STATIONS.indexOf(station)-1); if(!playing)start(); }
  else if(e.key.toLowerCase()==="r"){ shuffle(); } });

/* tooltip */
const tip=document.createElement("div"); tip.id="tip"; document.body.appendChild(tip);
function moveTip(x,y){ const w=tip.offsetWidth,h=tip.offsetHeight; tip.style.left=Math.min(x+14, innerWidth-w-10)+"px"; tip.style.top=Math.min(y+18, innerHeight-h-10)+"px"; }
document.addEventListener("pointermove",e=>{ const el=e.target.closest&&e.target.closest("[data-tip]");
  if(el && !document.body.classList.contains("mobile")){ tip.textContent=el.getAttribute("data-tip"); tip.style.opacity="1"; moveTip(e.clientX,e.clientY); } else tip.style.opacity="0"; });
document.addEventListener("pointerdown",()=>tip.style.opacity="0");

/* drag-to-scroll list */
(function(){ const L=$("list"); let down=false,sy=0,top=0,moved=0;
  L.addEventListener("pointerdown",e=>{ down=true; sy=e.clientY; top=L.scrollTop; moved=0; L.classList.add("grabbing"); });
  window.addEventListener("pointermove",e=>{ if(!down)return; const dy=e.clientY-sy; moved=Math.abs(dy); L.scrollTop=top-dy; });
  window.addEventListener("pointerup",()=>{ down=false; L.classList.remove("grabbing"); });
  L.addEventListener("click",e=>{ if(moved>6){ e.stopPropagation(); e.preventDefault(); } }, true); })();

/* init */
const isMobile = (matchMedia&&matchMedia("(pointer:coarse)").matches) || /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || innerWidth<700;
if(isMobile) document.body.classList.add("mobile");
document.body.dataset.skin="pixel";
/* pop-out mini player (Document Picture-in-Picture) — floats over other windows like Spotify */
let miniWin=null;
async function popOut(){
  if(!('documentPictureInPicture' in window)){ const tp=$("tip"); tp.textContent="Pop-out needs Chrome/Edge 116+"; tp.style.opacity="1"; setTimeout(()=>tp.style.opacity="0",2200); return; }
  if(miniWin){ try{miniWin.close();}catch(e){} miniWin=null; return; }
  if(!playing) start();
  const pip=await documentPictureInPicture.requestWindow({width:300,height:140}); const ac=css('--accent');
  const sEl=pip.document.createElement('style');
  sEl.textContent="*{box-sizing:border-box;font-family:ui-monospace,Menlo,Consolas,monospace;user-select:none}body{margin:0;background:#0a1020;color:#dff6ff;overflow:hidden}#m{padding:12px;display:flex;flex-direction:column;gap:7px;height:100%}.t{font-size:15px;color:"+ac+";text-shadow:0 0 6px "+ac+";white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.s{font-size:12px;color:#7fa8c9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.b{display:flex;gap:8px;margin-top:2px}button{flex:1;font-size:18px;cursor:pointer;background:#0e1838;color:#dff6ff;border:1px solid "+ac+";border-radius:7px;padding:7px}button.p{background:"+ac+";color:#02060f}";
  pip.document.head.appendChild(sEl);
  const root=pip.document.createElement('div'); root.id='m';
  root.innerHTML='<div class="t" id="mt">—</div><div class="s" id="ms">GRINDWAVE</div><div class="b"><button id="mp">⏮︎</button><button class="p" id="mpl">⏸︎</button><button id="mn">⏭︎</button></div>';
  pip.document.body.appendChild(root);
  pip.document.getElementById('mp').onclick=()=>{ setStation(STATIONS.indexOf(station)-1); if(!playing)start(); };
  pip.document.getElementById('mn').onclick=()=>{ setStation(STATIONS.indexOf(station)+1); if(!playing)start(); };
  pip.document.getElementById('mpl').onclick=()=>{ playing?stop():start(); };
  miniWin=pip; updateMini(); pip.addEventListener('pagehide',()=>{ miniWin=null; });
}
function updateMini(){ if(!miniWin)return; try{ const d=miniWin.document; d.getElementById('mt').textContent=station.name; d.getElementById('ms').textContent=SECTION_META[sectionKey].label+" · "+station.mood; d.getElementById('mpl').textContent=playing?"⏸︎":"▶︎"; }catch(e){} }
$("pip").onclick=popOut;

/* custom right-click menu (replaces the browser one) */
const cmenu=document.createElement("div"); cmenu.id="cmenu";
cmenu.innerHTML='<div data-a="play">▶ / ⏸&nbsp; play · pause</div><div data-a="next">⏭&nbsp; next station</div><div data-a="prev">⏮&nbsp; previous</div><div data-a="shuf">⟳&nbsp; reshuffle tune</div><div data-a="pip">⧉&nbsp; pop-out mini</div>';
document.body.appendChild(cmenu);
document.addEventListener("contextmenu",e=>{ e.preventDefault(); cmenu.style.display="block"; cmenu.style.left=Math.min(e.clientX,innerWidth-180)+"px"; cmenu.style.top=Math.min(e.clientY,innerHeight-190)+"px"; });
document.addEventListener("pointerdown",e=>{ if(!cmenu.contains(e.target)) cmenu.style.display="none"; });
cmenu.onclick=e=>{ const a=e.target.getAttribute&&e.target.getAttribute("data-a"); cmenu.style.display="none"; if(!a)return;
  if(a==="play")playing?stop():start(); else if(a==="next"){setStation(STATIONS.indexOf(station)+1);if(!playing)start();} else if(a==="prev"){setStation(STATIONS.indexOf(station)-1);if(!playing)start();} else if(a==="shuf")shuffle(); else if(a==="pip")popOut(); };

/* Game Boy: borders act as a real controller (per the original "controllers like the buttons" spec).
   A = play/pause · B = reshuffle · D-pad ←/→ = station · D-pad ▲/▼ = volume · SELECT/START = section */
function gbStation(dir){ setStation(STATIONS.indexOf(station)+dir); if(!playing)start(); }
function gbSection(dir){ const i=SECTION_ORDER.indexOf(sectionKey); setSection(SECTION_ORDER[(i+dir+SECTION_ORDER.length)%SECTION_ORDER.length]); }
function gbVol(d){ const inp=$("vol"); const v=Math.max(0,Math.min(100,Math.round((+inp.value)+d))); inp.value=v; volume=v/100; if(master&&playing)master.gain.value=volume; }
function initGbControls(){ const gb=$("gbframe"); if(!gb) return; const led=$("led");
  const press=el=>{ if(el){ el.classList.add("gbpress"); setTimeout(()=>el.classList.remove("gbpress"),130); } if(led){ led.classList.add("gbflash"); setTimeout(()=>led.classList.remove("gbflash"),150); } };
  const bind=(el,fn)=>{ if(!el)return; el.addEventListener("pointerdown",e=>{ e.preventDefault(); e.stopPropagation(); press(el); fn(); }); };
  bind(gb.querySelector(".abtn"), ()=>{ playing?stop():start(); });
  bind(gb.querySelector(".bbtn"), ()=>{ shuffle(); if(!playing)start(); });
  const ss=gb.querySelectorAll(".ss span"); bind(ss[0], ()=>gbSection(-1)); bind(ss[1], ()=>gbSection(1));
  const dpad=gb.querySelector(".dpad");
  if(dpad){ const mk=(css,fn)=>{ const z=document.createElement("div"); z.className="gbhit"; z.style.cssText=css; dpad.appendChild(z); bind(z,fn); };
    mk("left:0;top:0;width:100%;height:40%", ()=>gbVol(7));
    mk("left:0;bottom:0;width:100%;height:40%", ()=>gbVol(-7));
    mk("left:0;top:30%;width:40%;height:40%", ()=>gbStation(-1));
    mk("right:0;top:30%;width:40%;height:40%", ()=>gbStation(1)); } }
setupMedia(); renderTabs(); applyTheme(); setBarColor(sectionKey); renderList(); setUI(); marquee(); initCursor(); initGbControls(); sizeBg(); draw();
</script>

  });
